<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 写作工作流</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="toolbar">
    <span class="brand">🧭 AI 写作工作流</span>
    <button id="btn-add-input" class="tb">+ 输入框</button>
    <button id="btn-add-ai" class="tb">+ AI 框</button>
    <button id="btn-run-all" class="tb primary">向下游全部运行</button>
    <span class="sep"></span>
    <button id="btn-export" class="tb">导出 JSON</button>
    <button id="btn-import" class="tb">导入 JSON</button>
    <input type="file" id="file-import" accept="application/json" hidden />
    <button id="btn-settings" class="tb">API 设置</button>
    <span id="save-status" class="save-status">已保存</span>
  </header>

  <main id="canvas">
    <svg id="edge-layer"></svg>
    <div id="nodes-layer"></div>
    <div id="hint" class="hint">从节点右侧 <b>●</b> 端口拖到另一节点左侧 <b>●</b> 端口即可连线。输入框不能接收连线；AI 框可接收多个上游（按顺序拼接），也可向多个下游输出；连线不能成环。</div>
  </main>

  <!-- API 设置弹窗 -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-box">
      <h3>API 设置</h3>
      <label>Base URL（兼容 OpenAI）
        <input id="set-base" type="text" placeholder="https://api.deepseek.com/v1" />
      </label>
      <label>API Key
        <input id="set-key" type="password" placeholder="sk-..." />
      </label>
      <label>模型名
        <input id="set-model" type="text" placeholder="deepseek-chat" />
      </label>
      <p class="tip">密钥仅保存在本机浏览器（localStorage），不会上传到任何服务器。可切换为 OpenAI / 通义 / 本地 Ollama 等任意兼容端点。</p>
      <div class="modal-actions">
        <button id="set-cancel" class="tb">取消</button>
        <button id="set-save" class="tb primary">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
